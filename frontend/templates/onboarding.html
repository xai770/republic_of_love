<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — talent.yoga</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
    <style>
        /* ── Reset & base ─────────────────────────────── */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #4ade80 0%, #c4956a 45%, #7dd3fc 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* ── Frosted-glass card ───────────────────────── */
        .wizard {
            width: min(768px, 92vw);
            min-height: min(80vh, calc(100vh - 48px));
            max-height: calc(100vh - 48px);
            overflow-y: auto;
            background: rgba(255,255,255,.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,.18);
            padding: 40px 44px 36px;
            position: relative;
            display: flex; flex-direction: column;
            transition: opacity .35s ease, transform .35s ease;
        }
        .wizard.fade-out { opacity: 0; transform: translateY(12px); pointer-events: none; }

        /* ── Step counter ─────────────────────────────── */
        .step-counter {
            position: absolute; top: 18px; right: 24px;
            font-size: 13px; color: #94a3b8; font-weight: 500;
            letter-spacing: .4px;
        }

        /* ── Step panels ──────────────────────────────── */
        .step { display: none; flex-direction: column; gap: 24px; flex: 1; }
        .step.active { display: flex; }

        .step h2 {
            font-size: 24px; font-weight: 700; color: #1e293b;
            line-height: 1.25;
        }
        /* ── talent.yoga brand name ───────────────────── */
        .ty { font-weight: 700; }
        .ty-yoga { color: #0d9488; font-weight: 700; }
        /* ── Step 1 language label (not a headline) ───── */
        #s1-title {
            font-size: 0.75rem; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            color: #94a3b8; margin: 0;
        }
        .step p {
            font-size: 15px; color: #475569; line-height: 1.65;
        }

        /* ── Flag buttons (step 1) ────────────────────── */
        .flag-row {
            display: flex; gap: 20px; justify-content: center;
            margin-top: 8px;
        }
        .flag-btn {
            width: 88px; height: 88px;
            border-radius: 16px;
            border: 3px solid transparent;
            background: #f8fafc;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 6px; cursor: pointer;
            transition: all .2s;
            font-size: 38px;
            position: relative;
        }
        .flag-btn:hover { border-color: #0d9488; transform: translateY(-4px); box-shadow: 0 6px 20px rgba(13,148,136,.18); }
        .flag-btn.selected { border-color: #0d9488; background: #ccfbf1; }
        .flag-label {
            font-size: 14px; font-weight: 600; color: #4b5563;
            opacity: 0; transition: opacity .2s;
        }
        .flag-btn:hover .flag-label, .flag-btn.selected .flag-label { opacity: 1; }

        /* ── Germany map (step 2) ─────────────────────── */
        .germany-visual {
            display: flex; flex-direction: column; align-items: center; gap: 16px;
            margin: 8px 0;
        }
        .germany-svg { width: 180px; height: auto; }
        .germany-map-img { width: 220px; height: auto; filter: drop-shadow(2px 3px 6px rgba(0,0,0,0.15)); }
        .info-box {
            background: #fef3c7; border-radius: 12px; padding: 16px 20px;
            border-left: 4px solid #f59e0b;
        }
        .info-box p { color: #92400e; font-size: 14px; }

        /* ── Du/Sie cards (step 3) ────────────────────── */
        .formality-row {
            display: flex; gap: 20px; justify-content: center;
            margin-top: 8px;
        }
        .formality-card {
            flex: 1; max-width: 200px;
            padding: 28px 20px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background: #fff;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
        }
        .formality-card:hover { border-color: #0d9488; transform: translateY(-2px); }
        .formality-card.selected { border-color: #0d9488; background: #ccfbf1; }
        .formality-card .big { font-size: 28px; font-weight: 700; color: #1e293b; }
        .formality-card .desc { font-size: 13px; color: #64748b; margin-top: 6px; }

        /* ── Privacy (step 4) ─────────────────────────── */
        .privacy-content {
            background: #f8fafc; border-radius: 14px; padding: 20px 22px;
            max-height: 320px; overflow-y: auto;
            border: 1px solid #e2e8f0;
        }
        .privacy-content ul { list-style: none; padding: 0; }
        .privacy-content li {
            padding: 6px 0;
            font-size: 14px; color: #334155;
            display: flex; align-items: flex-start; gap: 8px;
        }
        .privacy-content li::before { content: "✓"; color: #22c55e; font-weight: 700; flex-shrink: 0; }
        .btn-row-privacy { display: flex; gap: 12px; margin-top: 4px; }

        /* ── Gender selector (step 5) ─────────────────── */
        .gender-row {
            display: flex; gap: 12px; justify-content: center;
            margin-bottom: 4px;
        }
        .gender-btn {
            padding: 8px 20px; border-radius: 20px;
            border: 2px solid #e2e8f0; background: #fff;
            font-size: 14px; font-weight: 500; color: #475569;
            cursor: pointer; transition: all .2s;
        }
        .gender-btn:hover { border-color: #5eead4; }
        .gender-btn.selected { border-color: #0d9488; background: #ccfbf1; color: #115e59; }

        /* ── Name grid (step 6) ─────────────────────── */
        .name-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 8px;
        }
        .name-chip {
            padding: 14px 22px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            background: #fff;
            text-align: center;
            font-size: 15px; font-weight: 500; color: #334155;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }
        .name-chip:hover { border-color: #5eead4; background: #f0fdfa; transform: translateY(-1px); }
        .name-chip.selected { border-color: #0d9488; background: #ccfbf1; color: #115e59; font-weight: 700; }
        .grid-footer {
            display: flex; justify-content: center; margin-top: 8px; gap: 12px;
        }

        /* ── Manual entry (step 7) ────────────────────── */
        .manual-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color .2s;
        }
        .manual-input:focus { border-color: #0d9488; }
        .validation-msg {
            font-size: 13px; min-height: 20px;
            padding: 0 4px;
        }
        .validation-msg.warning { color: #d97706; }
        .validation-msg.error { color: #dc2626; }
        .validation-msg.ok { color: #16a34a; }

        /* ── Buttons ──────────────────────────────────── */
        .btn {
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 15px; font-weight: 600;
            border: none; cursor: pointer;
            transition: all .2s;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary {
            background: #0d9488; color: #fff;
        }
        .btn-primary:hover { background: #0f766e; }
        .btn-primary:disabled { background: #99f6e4; cursor: not-allowed; }
        .btn-secondary {
            background: transparent; color: #64748b;
            border: 2px solid #e2e8f0;
        }
        .btn-secondary:hover { border-color: #94a3b8; color: #334155; }
        .btn-danger {
            background: transparent; color: #dc2626;
            border: 2px solid #fecaca;
        }
        .btn-danger:hover { background: #fef2f2; }
        .btn-ghost {
            background: transparent; color: #0d9488;
            border: none; text-decoration: underline;
            padding: 8px 12px;
        }
        .btn-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto; padding-top: 16px;
        }
        .btn-row-right { justify-content: flex-end; gap: 12px; }

        /* ── Loading spinner (buttons) ─────────────────── */
        .spinner { display: inline-block; width: 18px; height: 18px;
            border: 2px solid #99f6e4; border-top-color: #0d9488;
            border-radius: 50%; animation: spin .6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Logo juggle animation (LLM wait) ────────── */
        .generating-stage {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 32px 0 16px;
        }
        .logo-orbit {
            position: relative;
            width: 120px; height: 120px;
        }
        .logo-orbit img {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60px; height: auto;
            animation: logo-breathe 2s ease-in-out infinite;
        }
        .orbit-symbol {
            position: absolute;
            font-size: 20px;
            top: 50%; left: 50%;
            animation: orbit-spin 3s linear infinite;
        }
        .orbit-symbol:nth-child(2) { animation-delay: 0s; }
        .orbit-symbol:nth-child(3) { animation-delay: -0.6s; }
        .orbit-symbol:nth-child(4) { animation-delay: -1.2s; }
        .orbit-symbol:nth-child(5) { animation-delay: -1.8s; }
        .orbit-symbol:nth-child(6) { animation-delay: -2.4s; }
        @keyframes orbit-spin {
            0%   { transform: translate(-50%,-50%) rotate(0deg)   translateX(52px) rotate(0deg);   opacity: 0.6; }
            50%  { opacity: 1; }
            100% { transform: translate(-50%,-50%) rotate(360deg) translateX(52px) rotate(-360deg); opacity: 0.6; }
        }
        @keyframes logo-breathe {
            0%, 100% { transform: translate(-50%,-50%) scale(1); }
            50%      { transform: translate(-50%,-50%) scale(1.08); }
        }
        .generating-text {
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
            animation: text-pulse 2s ease-in-out infinite;
        }
        @keyframes text-pulse {
            0%, 100% { opacity: 0.5; }
            50%      { opacity: 1; }
        }

        /* ── Dismissed/rejected screen ────────────────── */
        .dismissed-screen {
            display: none;
            position: fixed; inset: 0;
            background: #fff;
            z-index: 100;
            flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
        }
        .dismissed-screen.active { display: flex; }
        .dismissed-screen p {
            font-size: 18px; color: #64748b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ── Responsive ───────────────────────────────── */
        @media (max-width: 520px) {
            .wizard { padding: 28px 24px 24px; }
            .flag-btn { width: 100px; height: 100px; font-size: 44px; }
            .name-chip { padding: 12px 16px; font-size: 14px; }
        }

        /* ── T&C read-buttons + checkbox (step 4) ─────────── */
        .tc-read-row {
            display: flex; align-items: center; gap: 12px;
            padding: 11px 16px; border-radius: 10px;
            border: 1.5px solid #e2e8f0; background: #f8fafc;
            cursor: pointer; transition: all .2s;
            font-size: 14px; color: #0d9488; font-weight: 600;
            text-decoration: none;
        }
        .tc-read-row:hover { border-color: #0d9488; background: #f0fdfa; }
        .tc-read-row.read {
            border-color: #4caf50; background: #f0fdf4; color: #166534;
        }
        .tc-read-row.read .tc-read-status { color: #4caf50; }
        .tc-read-status { font-size: 16px; flex-shrink: 0; }
        .tc-row {
            display: flex; align-items: flex-start; gap: 10px;
            margin-top: 4px; padding: 12px 14px;
            background: #f0fdf4; border-radius: 10px;
            border: 1px solid #bbf7d0;
        }
        .tc-row input[type="checkbox"] {
            width: 18px; height: 18px; margin-top: 2px;
            accent-color: #0d9488; flex-shrink: 0;
        }
        .tc-row input[type="checkbox"]:disabled { opacity: 0.4; cursor: not-allowed; }
        .tc-row:has(input:disabled) label { opacity: 0.55; cursor: default; }
        .tc-row label { font-size: 14px; color: #334155; cursor: pointer; line-height: 1.5; }

        /* ── Billing info (step 5) ────────────────────── */
        .billing-cards {
            display: flex; flex-direction: column; gap: 12px;
        }
        .billing-card {
            display: flex; align-items: flex-start; gap: 14px;
            padding: 14px 18px; border-radius: 12px;
            background: #f8fafc; border: 1px solid #e2e8f0;
        }
        .billing-card .bc-icon { font-size: 24px; flex-shrink: 0; }
        .billing-card .bc-text { font-size: 14px; color: #334155; line-height: 1.55; }
        .billing-card .bc-text strong { color: #0d9488; }

        /* ── Kickstart (step 9) ───────────────────────── */
        .kickstart-row {
            display: flex; gap: 16px; justify-content: center;
            flex-wrap: wrap; margin-top: 4px;
        }
        .kickstart-card {
            flex: 1; min-width: 180px; max-width: 220px;
            padding: 24px 16px; border-radius: 16px;
            border: 2px solid #e2e8f0; background: #fff;
            text-align: center; cursor: pointer;
            transition: all .2s;
        }
        .kickstart-card:hover {
            border-color: #0d9488; transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(13,148,136,.15);
        }
        .kickstart-card .ks-icon { font-size: 36px; margin-bottom: 8px; }
        .kickstart-card .ks-label { font-size: 15px; font-weight: 600; color: #1e293b; }
        .kickstart-card .ks-desc { font-size: 13px; color: #64748b; margin-top: 4px; }

        /* ── CV upload zone (step 9) ────────────────────── */
        .ob-upload-zone {
            border: 2px dashed #0d9488;
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: background .2s, border-color .2s;
            background: #f0fdfa;
        }
        .ob-upload-zone:hover, .ob-upload-zone.drag-over {
            background: #ccfbf1;
            border-color: #0f766e;
        }
        .ob-upload-zone .ob-uz-icon { font-size: 32px; margin-bottom: 6px; }
        .ob-upload-zone .ob-uz-label {
            font-size: 15px; font-weight: 600; color: #0d9488;
        }
        .ob-upload-zone .ob-uz-hint {
            font-size: 12px; color: #64748b; margin-top: 4px;
        }
        .ob-upload-status {
            padding: 18px; text-align: center;
            font-size: 14px; color: #334155;
        }
        .ob-upload-ok {
            font-size: 14px; color: #0d9488; font-weight: 600;
            padding: 12px 0 4px;
        }

        /* ── Legal overlay (step 4 inline T&C / PP) ──── */
        .legal-overlay {
            display: none; position: absolute; inset: 0;
            background: rgba(255,255,255,.97);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            z-index: 20;
            flex-direction: column;
            padding: 32px 36px 28px;
        }
        .legal-overlay.active { display: flex; }
        .legal-overlay h3 {
            font-size: 18px; font-weight: 700; color: #1e293b;
            margin-bottom: 12px;
        }
        .legal-overlay .legal-body {
            flex: 1; overflow-y: auto;
            font-size: 13px; color: #334155; line-height: 1.7;
            padding-right: 8px;
        }
        .legal-overlay .legal-body h4 {
            font-size: 14px; font-weight: 700; color: #0f172a;
            margin: 14px 0 6px;
        }
        .legal-overlay .legal-body p { margin-bottom: 8px; }
        .legal-overlay .legal-close {
            margin-top: 12px; align-self: flex-end;
        }
        .tc-link {
            color: #0d9488; text-decoration: underline; cursor: pointer;
            background: none; border: none; font: inherit; padding: 0;
        }
        .tc-link:hover { color: #0f766e; }
    </style>
</head>
<body>

<!-- ── Dismissed screen (privacy reject / cancel) ──── -->
<div class="dismissed-screen" id="dismissed-screen">
    <p id="dismissed-text">Du kannst dieses Fenster jetzt schließen.</p>
</div>

<!-- ── TY logo — fixed top-left corner ─────────────── -->
<div style="position:fixed;top:20px;left:20px;width:220px;height:146px;background:#fff;border-radius:20px;box-shadow:0 2px 14px rgba(0,0,0,.12);display:flex;align-items:center;justify-content:center;z-index:10;padding:12px;">
    <img src="/static/images/icons/logo_full.png" alt="talent.yoga" style="width:190px;height:auto;object-fit:contain;">
</div>

<!-- ── The wizard ──────────────────────────────────── -->
<div class="wizard" id="wizard">
    <span class="step-counter" id="step-counter"></span>

    <!-- Inline legal overlay (covers entire wizard card) -->
    <div class="legal-overlay" id="legal-overlay">
        <h3 id="legal-overlay-title"></h3>
        <div class="legal-body" id="legal-overlay-body"></div>
        <button class="btn btn-secondary legal-close" onclick="closeLegal()">← <span class="back-label"></span></button>
    </div>

    <!-- ════════ STEP 1 — Language ════════ -->
    <div class="step active" data-step="1" style="gap:0;">
        <div id="s1-welcome" style="
            flex:1;min-height:0;overflow-y:auto;
            text-align:left;line-height:1.7;
            font-size:0.92rem;color:#334155;
            padding:0 2px 0;
        "></div>
        <div style="margin-top:auto;padding-top:4px;">
            <div id="s1-closing" style="
                text-align:left;line-height:1.7;
                font-size:0.92rem;color:#334155;
                margin-bottom:20px;
            "></div>
            <hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 16px;">
            <p id="s1-label" style="font-size:0.75rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#94a3b8;margin:0 0 10px;"></p>
            <div class="flag-row">
                <button class="flag-btn" data-lang="de" onclick="selectLanguage('de')"
                        onmouseenter="previewLang('de')" onmouseleave="previewLang(null)">
                    🇩🇪
                    <span class="flag-label">Deutsch</span>
                </button>
                <button class="flag-btn" data-lang="en" onclick="selectLanguage('en')"
                        onmouseenter="previewLang('en')" onmouseleave="previewLang(null)">
                    🇬🇧
                    <span class="flag-label">English</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ════════ STEP 2 — Germany notice ════════ -->
    <div class="step" data-step="2">
        <h2 id="s2-title"></h2>
        <div class="germany-visual">
            <img src="/static/images/germany_flag_map.png" alt="Germany" class="germany-map-img">
        </div>
        <div class="info-box">
            <p id="s2-info"></p>
        </div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="goTo(1)">← <span class="back-label"></span></button>
            <button class="btn btn-primary" onclick="goTo(nextStepFrom(2))">
                <span class="next-label"></span> →
            </button>
        </div>
    </div>

    <!-- ════════ STEP 3 — Du / Sie (DE only) ════════ -->
    <div class="step" data-step="3">
        <h2 id="s3-title"></h2>
        <p id="s3-subtitle"></p>
        <div style="margin-bottom:0.5rem;">
            <button class="btn btn-secondary btn-sm" onclick="goTo(2)" style="padding:0.3rem 0.8rem;font-size:0.85rem;">← <span class="back-label"></span></button>
        </div>
        <div class="formality-row">
            <div class="formality-card" onclick="selectFormality('du')">
                <div class="big">Du</div>
                <div class="desc" id="s3-du-desc">Lass uns locker und offen reden.</div>
            </div>
            <div class="formality-card" onclick="selectFormality('sie')">
                <div class="big">Sie</div>
                <div class="desc" id="s3-sie-desc">Wir bleiben beim respektvollen Sie.</div>
            </div>
        </div>
    </div>

    <!-- ════════ STEP 4 — Terms & Privacy ════════ -->
    <div class="step" data-step="4">
        <h2 id="s4-title"></h2>
        <div class="privacy-content" id="s4-content"></div>

        <!-- Read buttons -->
        <div style="display:flex;flex-direction:column;gap:8px;margin-top:12px;">
            <div class="tc-read-row" id="btn-read-terms" onclick="showLegal('terms')" role="button" tabindex="0">
                <span class="tc-read-status" id="icon-terms">📄</span>
                <span id="s4-terms-btn"></span>
            </div>
            <div class="tc-read-row" id="btn-read-privacy" onclick="showLegal('privacy')" role="button" tabindex="0">
                <span class="tc-read-status" id="icon-privacy">🔒</span>
                <span id="s4-privacy-btn"></span>
            </div>
        </div>

        <!-- Checkbox -->
        <div class="tc-row" style="margin-top:8px;">
            <input type="checkbox" id="tc-checkbox" onchange="toggleTerms()" disabled>
            <label for="tc-checkbox" id="s4-tc-label"></label>
        </div>

        <div class="btn-row">
            <button class="btn btn-secondary" onclick="goTo(prevStepFrom(4))">← <span class="back-label"></span></button>
            <div style="display:flex;gap:12px;margin-left:auto;">
                <button class="btn btn-danger" onclick="rejectPrivacy()" id="s4-reject"></button>
                <button class="btn btn-primary" onclick="goTo(5)" id="s4-accept" disabled></button>
            </div>
        </div>
    </div>

    <!-- ════════ STEP 5 — How billing works ════════ -->
    <div class="step" data-step="5">
        <h2 id="s5-title"></h2>
        <p id="s5-subtitle"></p>
        <div class="billing-cards" id="s5-cards"></div>
        <div class="btn-row">
            <button class="btn btn-secondary" onclick="goTo(4)">← <span class="back-label"></span></button>
            <button class="btn btn-primary" onclick="goTo(6)">
                <span class="next-label"></span> →
            </button>

    // ── Helpers ────────────────────────────────────
    function c() {
        if (state.lang === 'en') return COPY.en;
        return state.formality === 'sie' ? COPY.de_sie : COPY.de_du;
    }

    function $(sel) { return document.querySelector(sel); }
    function $$(sel) { return document.querySelectorAll(sel); }

    function effectiveSteps() {
        // Numbered steps only (step 9 kickstart is unnumbered)
        return state.lang === 'en' ? 7 : 8;
    }

    function visibleStepNumber(step) {
        if (state.lang !== 'en') return step;
        // EN skips step 3 (Du/Sie): 1→1, 2→2, 4→3, 5→4, 6→5, 7→6, 8→7
        const map = {1:1, 2:2, 4:3, 5:4, 6:5, 7:6, 8:7};
        return map[step] || step;
    }

    // Which step comes after this one?
    window.nextStepFrom = function(step) {
        if (step === 2 && state.lang === 'en') return 4; // skip du/sie
        return step + 1;
    };

    // Which step comes before this one?
    window.prevStepFrom = function(step) {
        if (step === 4 && state.lang === 'en') return 2; // skip du/sie
        return step - 1;
    };

                <span class="orbit-symbol">✧</span>
                <span class="orbit-symbol">⬡</span>
                <span class="orbit-symbol">❋</span>
            </div>
            <div class="generating-text">${msg}</div>
        </div>`;
    }

    window.generateLLMNames = async function() {
        const keywords = ($('#keyword-input').value || '').trim();
        // Navigate to step 7 (name grid) immediately with animation
        goTo(7);
        const grid = $('#name-grid');
        grid.innerHTML = generatingHTML();
        state.chosenName = null;
        $('#btn-confirm-grid').disabled = true;
        try {
            const resp = await fetch(`/api/profiles/me/yogi-name/suggest-from-keywords?gender=${state.gender}&language=${state.lang}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({keywords}),
            });
            const data = await resp.json();
            const names = data.suggestions || [];
            grid.innerHTML = '';
            if (names.length === 0) {
                grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#94a3b8;">${c().s7_no_names}</p>`;
                return;
            }
            names.forEach(name => {
                const chip = document.createElement('div');
                chip.className = 'name-chip';
                chip.textContent = name;
                chip.onclick = () => pickGridName(name, chip);
                grid.appendChild(chip);
            });
        } catch (e) {
            grid.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:#dc2626;">${c().s7_error_names}</p>`;
        }
    };

    // Enter key triggers generate on keyword input
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'keyword-input') {
            e.preventDefault();
            generateLLMNames();
        }
    });

    function pickGridName(name, chip) {
        $$('.name-chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        state.chosenName = name;
        $('#btn-confirm-grid').disabled = false;
    }

    window.confirmGridName = function() {
        if (!state.chosenName) return;
        completeOnboarding(state.chosenName);
    };

    // ── Step 8 — Manual entry ──────────────────────
    let validateTimer = null;
    window.validateManualName = function() {
        const input = $('#manual-name');
        const msg = $('#validation-msg');
        const btn = $('#btn-confirm-manual');
        const name = input.value.trim();

        if (!name) {
            msg.textContent = '';
            msg.className = 'validation-msg';
            btn.disabled = true;
            return;
        }
        if (name.length < 3) {
            msg.textContent = state.lang === 'de'
                ? 'Mindestens 3 Zeichen'
                : 'At least 3 characters';
            msg.className = 'validation-msg error';
            btn.disabled = true;
            return;
        }

        clearTimeout(validateTimer);
        validateTimer = setTimeout(async () => {
            try {
                const resp = await fetch('/api/profiles/me/yogi-name', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({yogi_name: name, dry_run: true}),
                });
                const data = await resp.json();
                if (data.status === 'error') {
                    msg.textContent = data.error || data.detail || 'Invalid';
                    msg.className = 'validation-msg error';
                    btn.disabled = true;
                } else if (data.status === 'warning') {
                    msg.textContent = data.warning;
                    msg.className = 'validation-msg warning';
                    btn.disabled = false;
                } else {
                    msg.textContent = state.lang === 'de' ? '✓ Verfügbar' : '✓ Available';
                    msg.className = 'validation-msg ok';
                    btn.disabled = false;
                }
            } catch (e) {
                msg.textContent = '';
                btn.disabled = false;
            }
        }, 400);
    };

    window.confirmManualName = function() {
        const name = $('#manual-name').value.trim();
        if (!name || name.length < 3) return;
        completeOnboarding(name);
    };

    // ── Complete — save everything ─────────────────
    async function completeOnboarding(yogiName) {
        const btn = document.activeElement;
        if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner"></div>'; }

        try {
            const resp = await fetch('/api/onboarding/complete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    language: state.lang,
                    formality: state.formality,
                    yogi_name: yogiName,
                    terms_accepted: state.termsAccepted,
                }),
            });
            const data = await resp.json();
            if (data.ok) {
                // Set language cookie so the app remembers
                document.cookie = `lang=${state.lang};path=/;max-age=${365*86400};samesite=lax`;
                // Go to CV upload
                goTo(9);
            } else {
                alert(data.error || data.detail || 'Error');
                if (btn) { btn.disabled = false; btn.innerHTML = c().s8_confirm || 'Confirm'; }
            }
        } catch (e) {
            alert('Network error');
            if (btn) { btn.disabled = false; btn.innerHTML = c().s8_confirm || 'Confirm'; }
        }
    }

    // ── Notification opt-in (step 10) ───────────
    window._obNotifSkip = function() {
        window.location.href = '/dashboard';
    };

    window._obNotifSubmit = async function() {
        const input = $('#s10-email-input');
        const email = input ? input.value.trim() : '';
        const enableBtn = $('#s10-enable-btn');
        if (enableBtn) { enableBtn.disabled = true; enableBtn.textContent = c().s11_saving || '...'; }

        if (email) {
            try {
                await fetch('/api/account/email-consent', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ consent: true, email: email }),
                });
            } catch (e) {
                // non-critical — proceed regardless
            }
        }
        window.location.href = '/dashboard';
    };

    // ── CV skip (step 9) ────────────────────────
    window._obCVSkip = function() {
        goTo(10);
    };

    // ── Language settings (step 10) ─────────────
    window._obLangUIChange = function(val) {
        state.lang = val;
        document.cookie = `lang=${val};path=/;max-age=${365*86400};samesite=lax`;
        applyText();
    };

    window._obLangConfirm = async function() {
        const uiSel     = document.getElementById('s10-ui-select');
        const contentSel= document.getElementById('s10-content-select');
        const uiLang    = uiSel     ? uiSel.value     : (state.lang || 'de');
        const contentLang = contentSel ? contentSel.value : uiLang;
        const confirmBtn = document.getElementById('s10-confirm-btn');
        if (confirmBtn) { confirmBtn.disabled = true; }
        try {
            await fetch('/api/account/language-settings', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ui_language: uiLang, content_language: contentLang }),
            });
        } catch(e) { /* non-critical */ }
        goTo(11);
    };
    // ── CV upload (step 9) ──────────────────────────
    window._obHandleDrop = function(e) {
        e.preventDefault();
        const f = e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) _obHandleFile(f);
    };
    window._obHandleFile = async function(file) {
        if (!file) return;
        // GDPR gate — user must tick consent before LLM touches their data
        const gdprCb = document.getElementById('ob-gdpr-consent');
        if (!gdprCb || !gdprCb.checked) {
            const t2 = c && typeof c === 'function' ? c() : {};
            alert(t2.s9_gdpr_required || 'Please tick the consent box before uploading.');
            document.getElementById('ob-file-input').value = '';
            return;
        }
        const zone = document.getElementById('ob-upload-zone');
        const msg  = document.getElementById('ob-upload-msg');
        const t    = c();
        // hide zone, show spinner message
        zone.style.display = 'none';
        msg.style.display  = '';
        msg.className      = 'ob-upload-status';
        msg.innerHTML      = '<div class="spinner"></div>';
        try {
            const fd = new FormData();
            fd.append('file', file);
            fd.append('gdpr_consent', 'true');
            const res = await fetch('/api/profiles/me/parse-cv', { method: 'POST', body: fd });
            if (!res.ok) throw new Error((await res.json().catch(()=>({}))).detail || 'Upload failed');
            const { job_id } = await res.json();
            // Save for profile.html to pick up
            localStorage.setItem('cv_pending_job', JSON.stringify({
                job_id, filename: file.name, start_ms: Date.now()
            }));
            msg.className   = 'ob-upload-ok';
            msg.textContent = t.s9_cv_uploading || '✓ Analyzing in the background…';
            setTimeout(() => goTo(10), 1200);
        } catch(err) {
            // Restore zone so they can retry
            zone.style.display = '';
            msg.style.display  = 'none';
            const hint = document.getElementById('s9-cv-hint');
            if (hint) { hint.textContent = '⚠ ' + err.message; hint.style.color = '#e57373'; }
        }
    };

    // ── Init ───────────────────────────────────────
    applyText();
    previewLang(null); // render welcome text in default language

})();
</script>
